server:
  port: 8099
spring:
  application:
    name: wallet-account
  jpa:
    database: POSTGRESQL
    hibernate:
      ddl-auto: none
  datasource:
    driverClassName: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/walletaccount
    username: mywalletuser
    password: mywalletuser
  liquibase:
    change-log: classpath:db/changelog/changelog.yml
  sql:
    init:
      platform: postgres

# Management and Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
      probes:
        enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  health:
    db:
      enabled: true
    diskspace:
      enabled: true

# Swagger
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    use-root-path: true
    disable-swagger-default-url: true
    urls:
      - url: /wallet-account-openapi-v0.yaml
        name: Wallet Account API v0
      - url: /wallet-account-openapi-origin.yaml
        name: Wallet Account API origin (deprecated)
    urls-primary-name: Wallet Account API v0
