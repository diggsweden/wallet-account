server:
  port: 8099
spring:
  application:
    name: wallet-account
  jpa:
    database: POSTGRESQL
    hibernate:
      ddl-auto: none
  datasource:
    driverClassName: org.postgresql.Driver
    url: jdbc:postgresql://localhost:5432/walletaccount
    username: mywalletuser
    password: mywalletuser
  liquibase:
    change-log: classpath:db/changelog/changelog.yml
  sql:
    init:
      platform: postgres

# Management and Monitoring
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      show-components: always
      probes:
        enabled: true
    metrics:
      enabled: true
    prometheus:
      enabled: true
  health:
    db:
      enabled: true
    diskspace:
      enabled: true

properties:
  logging-filter:
    enabled: true
    max-payload-length: 10000
    exclude-path:
      exact-match: >
        /, /wallet-account/
      contains: >
        /actuator, /swagger, /v3/api-docs, .html, .png, .gif, .js, .yaml
    sensitive-data-mask:
      mask-value: "***MASKED***"
      # enter values in lower case
      headers: >
        authorization, x-api-key, api-key, apikey, x-auth-token, cookie, set-cookie, x-csrf-token
      body-json-fields: >
        password, secret, token, accessToken, access_token, refreshToken, refresh_token, apiKey, api_key
# Swagger
springdoc:
  api-docs:
    enabled: true
  swagger-ui:
    use-root-path: true
    disable-swagger-default-url: true
    urls:
      - url: /wallet-account-openapi-v0.yaml
        name: Wallet Account API v0
      - url: /wallet-account-openapi-origin.yaml
        name: Wallet Account API origin (deprecated)
    urls-primary-name: Wallet Account API v0
